version: "3.9"

services:
  backend:
    build:
      context: ./Backend
    ports:
      - "8080:8080"
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=8080
      # Optional: configure Gemini / CORS
      - CORS_ORIGINS=http://localhost:3000
      # - GEMINI_API_KEY=your_api_key_here

  frontend:
    build:
      context: ./Frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "3000"]
