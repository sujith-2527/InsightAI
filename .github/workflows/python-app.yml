name: Python Application Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pandas pytest
    
    - name: Run tests
      run: |
        python -m pytest Backend/test_intelligent.py -v || true
        python Backend/integration_test.py || true
    
    - name: Check code quality
      run: |
        pip install flake8
        flake8 Backend/app.py --count --select=E9,F63,F7,F82 --show-source --statistics || true
