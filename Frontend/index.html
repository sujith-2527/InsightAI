<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversational Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #94a3b8;
            font-size: 1.1em;
        }

        .query-box {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
        }

        .query-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        #queryInput {
            flex: 1;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            padding: 12px 16px;
            color: #e2e8f0;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        #queryInput:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        button {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1em;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }

        .quick-queries {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .quick-query-btn {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid #3b82f6;
            color: #60a5fa;
            padding: 8px 12px;
            font-size: 0.9em;
        }

        .quick-query-btn:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .results-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        @media (max-width: 1024px) {
            .results-grid {
                grid-template-columns: 1fr;
            }
        }

        .result-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 20px;
        }

        .result-card h2 {
            margin-bottom: 15px;
            color: #f1f5f9;
            font-size: 1.3em;
        }

        .meta-info {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .meta-item:last-child {
            border-bottom: none;
        }

        .meta-label {
            color: #94a3b8;
            font-size: 0.9em;
        }

        .meta-value {
            color: #60a5fa;
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        #chartContainer {
            position: relative;
            height: 400px;
            margin-bottom: 20px;
        }

        .data-table {
            max-height: 500px;
            overflow-y: auto;
        }

        .data-row {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.95em;
        }

        .data-row-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .data-row-item:last-child {
            margin-bottom: 0;
        }

        .data-key {
            color: #94a3b8;
        }

        .data-value {
            color: #34d399;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #94a3b8;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .query-info {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(52, 211, 153, 0.1));
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #cbd5e1;
        }

        .agg-badge {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 600;
            margin-left: 10px;
        }

        .history {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #334155;
        }

        .history h3 {
            color: #cbd5e1;
            margin-bottom: 15px;
        }

        .history-item {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #334155;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.8);
        }

        .history-text {
            color: #e2e8f0;
            margin-bottom: 4px;
        }

        .history-time {
            color: #64748b;
            font-size: 0.85em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #64748b;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 20px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(30, 41, 59, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(100, 116, 139, 0.7);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 116, 139, 1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Conversational Dashboard</h1>
            <p>Ask questions about your data in natural language</p>
        </div>

        <div class="query-box">
            <div class="query-input-group">
                <input 
                    type="text" 
                    id="queryInput" 
                    placeholder="Ask a question... e.g., 'What is the average price by model?'"
                    autofocus
                >
                <button id="queryBtn" onclick="submitQuery()">Query</button>
            </div>
            
            <div class="quick-queries">
                <button class="quick-query-btn" onclick="setQuery('What is the average price by model?')">
                    Average Price by Model
                </button>
                <button class="quick-query-btn" onclick="setQuery('Show me total tax grouped by transmission')">
                    Tax by Transmission
                </button>
                <button class="quick-query-btn" onclick="setQuery('How many cars by year?')">
                    Cars by Year
                </button>
                <button class="quick-query-btn" onclick="setQuery('Maximum mileage by fueltype')">
                    Max Mileage
                </button>
                <button class="quick-query-btn" onclick="setQuery('Average engine size by fuel type')">
                    Engine Size by Fuel
                </button>
            </div>
        </div>

        <div id="error" class="error"></div>

        <div id="loading" style="display: none;">
            <div class="loading">
                <div class="spinner"></div>
                <p>Analyzing your query...</p>
            </div>
        </div>

        <div id="results" style="display: none;">
            <div class="results-grid">
                <div class="result-card">
                    <h2>Visualization</h2>
                    <div id="queryInfo" class="query-info"></div>
                    <div id="chartContainer">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>

                <div class="result-card">
                    <h2>Data</h2>
                    <div id="dataTable" class="data-table"></div>
                </div>
            </div>

            <div id="history" style="display: none;" class="history">
                <h3>Recent Queries</h3>
                <div id="historyList"></div>
            </div>
        </div>

        <div id="emptyState" class="empty-state">
            <div class="empty-state-icon">📈</div>
            <p>Enter a query to get started</p>
            <p style="font-size: 0.9em; margin-top: 10px; color: #475569;">
                Try: "What is the average price by model?"
            </p>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8080';
        let chart = null;
        let queryHistory = [];

        const queryInput = document.getElementById('queryInput');
        const queryBtn = document.getElementById('queryBtn');

        queryInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') submitQuery();
        });

        function setQuery(q) {
            queryInput.value = q;
            submitQuery();
        }

        async function submitQuery() {
            const query = queryInput.value.trim();
            if (!query) return;

            queryBtn.disabled = true;
            document.getElementById('results').style.display = 'none';
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('error').classList.remove('show');

            try {
                const response = await fetch(`${API_URL}/query`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_query: query })
                });

                const data = await response.json();

                if (data.error) {
                    showError(data.error);
                } else {
                    displayResults(data);
                    addToHistory(query);
                }
            } catch (err) {
                showError(`Connection error: ${err.message}`);
            } finally {
                queryBtn.disabled = false;
                document.getElementById('loading').style.display = 'none';
            }
        }

        function displayResults(data) {
            const results = document.getElementById('results');
            const meta = data.meta || {};
            const chartData = data.data || [];

            // Display query info
            const queryInfo = document.getElementById('queryInfo');
            queryInfo.innerHTML = `
                <div style="margin-bottom: 10px;">
                    <strong>${meta.query_parsed || 'Query'}</strong>
                    <span class="agg-badge">${(meta.aggregation || 'ANALYSIS').toUpperCase()}</span>
                </div>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; font-size: 0.9em;">
                    <div style="background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 6px;">
                        <div style="color: #94a3b8;">X-Axis</div>
                        <div style="color: #60a5fa; font-family: monospace; font-weight: 600;">${meta.x}</div>
                    </div>
                    <div style="background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 6px;">
                        <div style="color: #94a3b8;">Y-Axis</div>
                        <div style="color: #60a5fa; font-family: monospace; font-weight: 600;">${meta.y}</div>
                    </div>
                    <div style="background: rgba(15, 23, 42, 0.8); padding: 10px; border-radius: 6px;">
                        <div style="color: #94a3b8;">Records</div>
                        <div style="color: #60a5fa; font-family: monospace; font-weight: 600;">${meta.record_count || chartData.length}</div>
                    </div>
                </div>
            `;

            // Prepare chart data
            const xAxis = meta.x;
            const yAxis = meta.y;
            
            const chartLabels = chartData.map(d => String(d[xAxis]).substring(0, 20));
            const chartValues = chartData.map(d => parseFloat(d[yAxis]) || 0);

            // Render chart
            const ctx = document.getElementById('myChart');
            if (chart) chart.destroy();
            
            chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        label: yAxis,
                        data: chartValues,
                        backgroundColor: 'rgba(59, 130, 246, 0.7)',
                        borderColor: 'rgba(59, 130, 246, 1)',
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { color: '#cbd5e1', font: { size: 12 } }
                        }
                    },
                    scales: {
                        y: {
                            grid: { color: 'rgba(51, 65, 85, 0.3)' },
                            ticks: { color: '#94a3b8' }
                        },
                        x: {
                            grid: { display: false },
                            ticks: { color: '#94a3b8' }
                        }
                    }
                }
            });

            // Render data table
            const dataTable = document.getElementById('dataTable');
            dataTable.innerHTML = chartData.slice(0, 10).map((item, i) => `
                <div class="data-row">
                    ${Object.entries(item).map(([k, v]) => `
                        <div class="data-row-item">
                            <span class="data-key">${k}</span>
                            <span class="data-value">${typeof v === 'number' ? v.toFixed(2) : v}</span>
                        </div>
                    `).join('')}
                </div>
            `).join('');

            if (chartData.length > 10) {
                dataTable.innerHTML += `<div style="color: #94a3b8; font-size: 0.9em; margin-top: 10px;">+${chartData.length - 10} more records</div>`;
            }

            results.style.display = 'block';
            document.getElementById('emptyState').style.display = 'none';
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.classList.add('show');
        }

        function addToHistory(query) {
            queryHistory = [{ query, time: new Date() }, ...queryHistory.slice(0, 4)];
            
            if (queryHistory.length > 0) {
                document.getElementById('history').style.display = 'block';
                const historyList = document.getElementById('historyList');
                historyList.innerHTML = queryHistory.map((item, i) => `
                    <div class="history-item" onclick="setQuery('${item.query.replace(/'/g, "\\'")}')">
                        <div class="history-text">${item.query}</div>
                        <div class="history-time">${item.time.toLocaleTimeString()}</div>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
